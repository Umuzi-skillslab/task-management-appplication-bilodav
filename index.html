<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <h1>Task Management System</h1>

      <div class="add-task-section">
        <h2>Add New Task</h2>
        <!-- Form with issues -->
        <form class="add-task-form">
          <input
            class="add-task-input"
            type="text"
            id="title"
            placeholder="Task Title"
          />
          <input
            class="add-task-input"
            type="text"
            id="description"
            placeholder="Description"
          />
          <select id="priority"></select>
          <button class="add-task-btn">Add Task</button>
        </form>
      </div>
      <div class="filter-task-section hidden">
        <fieldset>
          <label>Search by Main Task Title:</label>
          <form>
            <input id="search-by-title" placeholder="Search here" />
          </form>
        </fieldset>
        <fieldset>
          <label>Sort By:</label>
          <select id="sort-by">
            <option value="order-added">Order Added</option>
            <option value="high">Highest Priority First</option>
            <option value="low">Lowest Priority First</option>
            <option value="done">Completed Tasks</option>
            <option value="not-done">Uncompleted Tasks</option>
          </select>
        </fieldset>
        <fieldset>
          <label>Filter By: </label>
          <select id="filter-by">
            <option value="all">All</option>
            <option value="high">Highest Priority</option>
            <option value="medium">Medium Priority</option>
            <option value="low">Lowest Priority</option>
            <option value="done">Completed Tasks</option>
            <option value="not-done">Uncompleted Tasks</option>
          </select>
        </fieldset>
      </div>
      <div class="task-list" id="task-list">
        <!-- Tasks will be displayed here -->
      </div>

      <div class="statistics">
        <!-- Added: statistics display -->
      </div>
    </div>

    <!-- Scripts loaded now in the right order-->
    <script type="module" src="./src/utils.js"></script>
    <script type="module" src="./src/app.js"></script>
    <script type="module" src="./src/dom.js"></script>
    <!-- Added utils.js module script -->
  </body>
</html>
